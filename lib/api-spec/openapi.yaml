openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/runtime-config:
    get:
      operationId: getRuntimeConfig
      tags: [admin]
      summary: Get mini-app safe runtime config
      description: >
        Public endpoint. Returns only non-sensitive fields required by the mini-app at runtime:
        settings, game_overrides, ticket_overrides, referral_config, daily_checkin, and active notifications.
        Never returns PII, api_keys, finance, security, or backup data.
      responses:
        "200":
          description: Mini-app safe runtime config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeConfig"

  /admin/state:
    get:
      operationId: getAdminState
      tags: [admin]
      summary: Get full admin state (auth required)
      description: Returns all configuration and entity lists. Requires an active admin session (JWT cookie). Use /admin/runtime-config for unauthenticated mini-app access.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Full admin state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminState"
        "401":
          description: Unauthorized

  /admin/config/{key}:
    put:
      operationId: putAdminConfig
      tags: [admin]
      summary: Update a config section
      security:
        - cookieAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            enum:
              - settings
              - game_overrides
              - ticket_overrides
              - cms
              - finance
              - security
              - backup
              - referral_config
              - daily_checkin
              - api_keys
              - roles
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/notifications:
    get:
      operationId: listNotifications
      tags: [admin]
      security:
        - cookieAuth: []
      summary: List app notifications
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
