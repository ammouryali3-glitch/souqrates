components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: skz_admin_token
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    AppNotification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, success, warning, promo]
        startAt:
          type: number
        endAt:
          type: number
      required:
        - id
        - title
        - message
        - type
        - startAt
        - endAt

    AdminState:
      type: object
      properties:
        config:
          type: object
          additionalProperties: {}
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/AppNotification"
        users:
          type: array
          items: {}
        deposits:
          type: array
          items: {}
        withdrawals:
          type: array
          items: {}
        tokenPackages:
          type: array
          items: {}
        inventory:
          type: array
          items: {}
        socialTasks:
          type: array
          items: {}
        promoCodes:
          type: array
          items: {}
        broadcasts:
          type: array
          items: {}
        tickets:
          type: array
          items: {}
        products:
          type: array
          items: {}
        referrers:
          type: array
          items: {}
      required:
        - config
        - notifications
        - users
        - deposits
        - withdrawals
        - tokenPackages
        - inventory
        - socialTasks
        - promoCodes
        - broadcasts
        - tickets
        - products
        - referrers

    RuntimeConfig:
      type: object
      description: Mini-app safe public runtime config. Never contains PII or sensitive admin data.
      properties:
        config:
          type: object
          description: Allowlisted config keys (settings, game_overrides, ticket_overrides, referral_config, daily_checkin)
          additionalProperties: {}
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/AppNotification"
      required:
        - config
        - notifications
